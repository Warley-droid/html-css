<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/logo.ico.ico" type="image/x-icon">
    <title>Links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: red ;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{
            color: darkred;
        }
        a:hover{
            text-decoration:underline;
            color:rgb(0, 0, 0)
        }
        a:active{
            color:yellow;
        }
        .principal::before{
            content:"«"
        }
        .principal::after{
            content:"»";
            text-decoration: none;
            font-weight: normal;
            color: darkgray;
        }
        .principal{
            background-color: rgb(222, 255, 255);
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io/" target="_blank">Repositório  </a></li>
        <li><a href="https://www.youtube.com/@cursoemvideo" target="_blank" class="principal">Canal do YouTube</a></li>
        <li><a href="https://www.cursoemvideo.com/" target="_blank">Site do Cursoemvideo</a></li>
    </ul>
    
</body>
</html>
