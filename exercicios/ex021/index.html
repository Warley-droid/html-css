<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/logo.ico.ico" type="image/x-icon">
    <title>Modelo de Caixas</title>
    <style>
        #principal{
            background-color: rgb(0, 42, 255);
            height: 300px ;

            border-width: 1em;
            border-style: solid;

            padding: 6px, 6px, 6px, 6px;

        }

            border: 1em , solid,  aqua;

        }
    </style>
</head>
<body>

    <h1 id="principal">Exemplo de um box-level</h1>
    <p>Parágrafos também são exemplos de um box-level, mas os <a href="#">links também são exemplos de caixas inline-level</a>, vamos ver como isso tudo funciona.</p>
